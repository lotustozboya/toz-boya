<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lotus Boya — LB monogram
  Görselden traced, klasik serif Didone tarzı.

  Grid: 300 × 300 units
  Construction:
    - B (arka plan): sol stem L ile shared, iki kavisli oda counter
    - L (önde): kalın stem + üst seriflerle, uzun foot B'nin alt loop'una
      doğru uzanır ve overlap zone'da B'yi örter
  Color: currentColor — herhangi bir arka plan üzerinde çalışır
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 300 300"
  fill="currentColor"
  fill-rule="evenodd"
  aria-labelledby="lb-title"
  role="img"
>
  <title id="lb-title">Lotus Boya</title>

  <!--
    B harfi — sol stem (62-92 x), iki kavisli oda counter olarak punch-out.
    Üst oda küçük (y 60-130), alt oda büyük (y 140-235).
    Sol stem L harfi tarafından örtüldüğü için sadece sağ tarafı görünür.
    Üst ve alt köşelerde serif çıkıntıları.
  -->
  <path d="
    M 62 50
    L 62 60
    L 92 60
    L 92 240
    L 62 240
    L 62 250
    L 200 250
    Q 250 250 250 195
    Q 250 158 218 145
    L 218 143
    Q 240 130 240 100
    Q 240 50 192 50
    Z

    M 122 70
    L 188 70
    Q 215 70 215 100
    Q 215 132 188 132
    L 122 132
    Z

    M 122 158
    L 196 158
    Q 225 158 225 195
    Q 225 232 196 232
    L 122 232
    Z
  " />

  <!--
    L harfi — kalın stem üst seriflerle, geniş foot sağa uzanır.
    Stem: x 30-90, y 50-240
    Üst sol serif: x 22-30, y 50-65
    Üst sağ serif: x 90-100, y 50-65 (B ile çakışmasın diye küçük tutuldu)
    Alt foot: y 240-260, x 30-180 (B'nin alt loop'una uzanır, örter)
    Foot sağ serif çıkıntıları
  -->
  <path d="
    M 22 50
    L 22 65
    L 32 65
    L 32 240
    L 22 240
    L 22 250
    L 22 270
    L 30 270
    L 175 270
    L 185 270
    L 185 250
    L 175 250
    L 175 240
    L 92 240
    L 92 65
    L 100 65
    L 100 50
    Z
  " />
</svg>
